<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Studio Overlay</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent !important;
        overflow: hidden;
        cursor: default;
        /* Hide native scrollbars in case Pixi resizes oddly */
        overscroll-behavior: none;
      }
      body {
        font-family:
          'Instrument Sans',
          ui-sans-serif,
          system-ui,
          sans-serif;
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
